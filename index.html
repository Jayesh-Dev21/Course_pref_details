*,
*::before,
*::after {
  box-sizing: border-box;
}
* {
  margin: 0;
}
html, body {
  height: 100%;
  overscroll-behavior: none;
}
body {
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-family: "Lato", sans-serif;

  --slate-900: #0f172a;
  --slate-800: #1e293b;
  --slate-700: #334155;
  --slate-500: #64748b;
  --slate-300: #cbd5e1;
  --slate-400: #94a3b8;
  --slate-200: #e2e8f0;
  --slate-100: #f1f5f9;
  --slate-50: #f8fafc;

  --zinc-900: #18181b;
  --neutral-900: #171717;
  --neutral-800: #262626;
  --neutral-700: #404040;
  --neutral-600: #525252;
  --neutral-500: #737373;
  --neutral-400: #a3a3a3;
  --neutral-300: #d4d4d4;

  --emerald-100: #d1fae5;
  --yellow-200: #fef08a;
  --yellow-100: #fef9c3;
  --yellow-300: #fde047;
  --yellow-400: #facc15;
  --yellow-500: #eab308;
  --yellow-600: #ca8a04;
  --yellow-700: #a16207;
  --yellow-800: #854d0e;
  --yellow-950: #422006;
  --green-600: #16a34a;
  --green-900: #14532d;
  --blue-900: #1e3a8a;
  --sky-950: #082f49;

  color: var(--neutral-900);
  --border-color: var(--slate-400);
  --bg: var(--slate-300);
  --row-hover: var(--slate-400);
  --batch-bg: var(--slate-200);
  --search-bg: var(--slate-100);
  --sem-header: var(--slate-700);
  --badge-default-bg: var(--slate-400);
  --badge-default-fg: var(--slate-100);

  background-color: var(--bg);
}

body.dark {
  --slate-900: #0f172a;
  --slate-800: #1e293b;
  --slate-700: #334155;
  --slate-500: #64748b;
  --slate-300: #334155;
  --slate-400: #475569;
  --slate-200: #1e293b;
  --slate-100: #262626;
  --slate-50: #171717;

  --neutral-900: #f1f5f9;
  --neutral-800: #e2e8f0;
  --neutral-700: #cbd5e1;
  --neutral-600: #94a3b8;
  --neutral-500: #64748b;
  --neutral-400: #475569;
  --neutral-300: #334155;

  color: var(--neutral-900);
  --border-color: var(--slate-500);
  --bg: #0f172a;
  --row-hover: #1e293b;
  --batch-bg: #1e293b;
  --search-bg: #262626;
  --sem-header: var(--slate-300);
  --badge-default-bg: var(--slate-500);
  --badge-default-fg: var(--slate-200);

  background-color: var(--bg);
}
img, picture, video, canvas, svg {
  display: block;
  max-width: 100%;
}
input, button, textarea, select {
  font: inherit;
}
p, h1, h2, h3, h4, h5, h6 {
  overflow-wrap: break-word;
}
#root {
  isolation: isolate;
  display: flex;
  flex-direction: column;
  height: 100svh;
  max-height: 100svh;
  height: 100dvh;
  max-height: 100dvh;
}

header {
  padding: 1rem 1rem 16px 24px;
  line-height: 1;
  border-bottom: 1px solid var(--border-color);
  font-family: monospace;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  position: relative;
  flex-shrink: 0;
}
.header-left {
  display: flex;
  gap: 0.25rem;
  flex-direction: column;
}
header h1 {
  font-size: 1.5rem;
  margin: 0;
  font-family: "Lato", sans-serif;
}
.subhead {
  font-size: 0.875rem;
  opacity: 0.7;
  transform: translateX(1px);
  font-family: monospace;
}
.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.5rem;
}
.header-right a {
  color: inherit;
  transition: color 0.1s ease-in-out;
}
.header-right a:hover {
  color: var(--neutral-500);
}
.header-actions {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 0.5rem;
}
.gh-star {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  text-decoration: none;
  font-size: 0.8rem;
  font-family: "Lato", sans-serif;
  padding: 0.25rem 0.5rem;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  transition: background-color 0.1s ease-in-out;
}
.gh-star:hover {
  background-color: var(--row-hover);
  color: var(--neutral-900) !important;
}
.dark-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  padding: 0.25rem;
  cursor: pointer;
  color: var(--neutral-700);
  transition: background-color 0.1s ease-in-out;
}
.dark-toggle:hover {
  background-color: var(--row-hover);
  color: var(--neutral-900);
}
.dark-toggle .sun,
.dark-toggle .moon {
  display: block;
}
body.dark .dark-toggle .sun {
  display: none;
}
body:not(.dark) .dark-toggle .moon {
  display: none;
}

.search-bar {
  padding: 0.5rem 24px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}
.search-bar input {
  width: 100%;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  background: var(--search-bg);
  color: var(--neutral-900);
  font-family: monospace;
  font-size: 0.875rem;
  outline: none;
  transition: border-color 0.1s ease-in-out;
}
.search-bar input:focus {
  border-color: var(--neutral-600);
}
.search-bar input::placeholder {
  color: var(--neutral-500);
}

.content {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overscroll-behavior: contain;
}
.content::-webkit-scrollbar {
  width: 0;
}
.course-count {
  padding: 0.5rem 24px;
  font-family: monospace;
  font-size: 0.75rem;
  color: var(--neutral-600);
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.row {
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--border-color);
  transition: background-color 0.1s ease-in-out;
  cursor: pointer;
}
.row:hover,
.row.focused {
  background-color: var(--row-hover);
}
.row.focused {
  outline: 1px solid var(--neutral-600);
  outline-offset: -1px;
}
.row-main {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 0.5rem;
  padding: 0.5rem 24px;
  align-items: center;
  font-family: monospace;
  font-size: 0.875rem;
}
.row-index {
  opacity: 0.7;
  user-select: none;
}
.row-index span {
  opacity: 0.3;
}
.row-info {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.row-code {
  color: var(--neutral-700);
}
.row-name {
  color: var(--neutral-900);
}
.row-meta {
  font-size: 0.75rem;
  color: var(--neutral-600);
}
.row-toggle {
  color: var(--neutral-600);
  transition: transform 0.15s ease-in-out;
}
.row-toggle.open {
  transform: rotate(180deg);
}

.batch-details {
  display: none;
  max-height: 300px;
  overflow-y: auto;
  background: var(--batch-bg);
}
.batch-details.open {
  display: block;
}
.batch-details::-webkit-scrollbar {
  width: 6px;
}
.batch-details::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 3px;
}
.batch-details-inner {
  padding: 0.5rem 24px 0.75rem;
  border-top: 1px solid var(--border-color);
}
.semester-group {
  margin-bottom: 0.75rem;
}
.semester-group:last-child {
  margin-bottom: 0;
}
.semester-header {
  font-family: monospace;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--sem-header);
  margin-bottom: 0.25rem;
  padding-bottom: 0.125rem;
  border-bottom: 1px dashed var(--border-color);
}
.batch-item {
  font-family: monospace;
  font-size: 0.75rem;
  color: var(--neutral-700);
  padding: 0.125rem 0 0.125rem 0.75rem;
}
.batch-item .type-badge {
  display: inline-block;
  font-size: 0.625rem;
  padding: 0 0.375rem;
  border-radius: 3px;
  margin-right: 0.375rem;
  background: var(--badge-default-bg);
  color: var(--badge-default-fg);
}
.type-badge.oe {
  background: var(--yellow-600);
  color: var(--yellow-100);
}
.type-badge.st {
  background: var(--blue-900);
  color: var(--slate-200);
}
.type-badge.compulsory {
  background: var(--green-600);
  color: var(--emerald-100);
}
.no-batches {
  font-family: monospace;
  font-size: 0.75rem;
  color: var(--neutral-500);
  font-style: italic;
}

.no-results {
  padding: 2rem 24px;
  text-align: center;
  font-family: monospace;
  font-size: 0.875rem;
  color: var(--neutral-500);
}

@media (max-width: 768px) {
  header {
    flex-direction: column;
    gap: 1rem;
    padding-left: 0.5rem;
    padding-right: 0.5rem;
  }
  .header-left {
    align-items: center;
  }
  .header-right {
    flex-direction: row;
    width: 100%;
    justify-content: space-between;
    align-items: center;
  }
  .header-actions {
    order: 1;
  }
  .header-right p {
    order: 0;
  }
  .row-main {
    grid-template-columns: 1fr auto;
    padding: 0.5rem 12px;
  }
  .row-index {
    display: none;
  }
  .search-bar {
    padding: 0.5rem 12px;
  }
  .course-count {
    padding: 0.5rem 12px;
  }
}

@media (max-width: 550px) {
  .row-main {
    font-size: 0.75rem;
  }
}

  <script>
(function() {
  const stored = localStorage.getItem("darkMode");
  if (stored === "true") document.body.classList.add("dark");
})();

document.getElementById("dark-toggle").addEventListener("click", () => {
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
});

const SUBHEADS = [
  "All choices, in case you miss one",
  "Scroll till you find the right elective",
  "Open electives for S6 2026",
];

document.getElementById("subhead").textContent =
  SUBHEADS[Math.floor(Math.random() * SUBHEADS.length)];

const courses = JSON.parse(document.getElementById("courses-data").textContent);
const courseList = Object.entries(courses).map(([code, c], i) => ({
  code,
  ...c,
  index: i + 1,
}));

const searchInput = document.getElementById("search");
const content = document.getElementById("content");
const courseCount = document.getElementById("course-count");

let expandedIndex = null;
let focusedRow = 0;

function getTypeClass(type) {
  const t = type.toLowerCase();
  if (t.includes("open elective")) return "oe";
  if (t.includes("compulsory")) return "compulsory";
  if (t.includes("st")) return "st";
  return "";
}

function renderBatchDetails(course) {
  const batches = course.batches;
  if (!batches || batches.length === 0) {
    return '<div class="no-batches">No previous batch data available.</div>';
  }

  const grouped = {};
  for (const b of batches) {
    const sem = b.semester;
    if (!grouped[sem]) grouped[sem] = [];
    grouped[sem].push(b);
  }

  const sortedSems = Object.keys(grouped).sort().reverse();

  let html = "";
  for (const sem of sortedSems) {
    const group = grouped[sem];
    html += '<div class="semester-group">';
    html += `<div class="semester-header">${sem} (${group.length} batch${group.length > 1 ? "es" : ""})</div>`;
    for (const b of group) {
      const typeClass = getTypeClass(b.type);
      html += `<div class="batch-item"><span class="type-badge ${typeClass}">${b.type}</span> ${b.batch}</div>`;
    }
    html += "</div>";
  }
  return html;
}

let filtered = [];

function render() {
  const query = searchInput.value.toLowerCase().trim();

  filtered = query
    ? courseList.filter((c) => {
        const searchStr = `${c.code} ${c.name} ${c.department} ${c.professor}`.toLowerCase();
        return searchStr.includes(query);
      })
    : courseList;

  courseCount.textContent = `${filtered.length} of ${courseList.length} elective${courseList.length > 1 ? "s" : ""}`;

  if (filtered.length === 0) {
    content.innerHTML = '<div class="no-results">No electives match your search.</div>';
    focusedRow = 0;
    return;
  }

  if (focusedRow >= filtered.length) focusedRow = filtered.length - 1;
  if (focusedRow < 0) focusedRow = 0;

  const padLen = filtered.length > 99 ? 3 : 2;

  let html = "";
  for (const c of filtered) {
    const idx = String(c.index).padStart(padLen, "0");
    const isOpen = expandedIndex === c.index;
    const isFocused = filtered.indexOf(c) === focusedRow;

    html += `<div class="row ${isFocused ? "focused" : ""}" data-index="${c.index}">`;
    html += `  <div class="row-main">`;
    html += `    <div class="row-index"><span>${"0".repeat(3 - String(c.index).length)}</span>${c.index}</div>`;
    html += `    <div class="row-info">`;
    html += `      <div><span class="row-code">${c.code}</span> <span class="row-name">${c.name}</span></div>`;
    html += `      <div class="row-meta">${c.department}${c.professor && c.professor !== "-" ? " &middot; " + c.professor : ""} &middot; ${c.credits} credits${c.ltp && c.ltp !== "-" ? " &middot; " + c.ltp : ""}</div>`;
    html += `    </div>`;
    html += `    <div class="row-toggle ${isOpen ? "open" : ""}">`;
    html += `      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>`;
    html += `    </div>`;
    html += `  </div>`;
    html += `  <div class="batch-details ${isOpen ? "open" : ""}">`;
    html += `    <div class="batch-details-inner">${renderBatchDetails(c)}</div>`;
    html += `  </div>`;
    html += `</div>`;
  }

  content.innerHTML = html;

  content.querySelectorAll(".row").forEach((el) => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.index, 10);
      expandedIndex = expandedIndex === idx ? null : idx;
      render();
    });
  });
}

searchInput.addEventListener("input", () => {
  expandedIndex = null;
  focusedRow = 0;
  render();
});

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;

  if (e.key === "j" || (e.key === "n" && e.ctrlKey)) {
    e.preventDefault();
    focusedRow = Math.min(focusedRow + 1, filtered.length - 1);
    render();
    const row = content.querySelector(".row.focused");
    if (row) row.scrollIntoView({ block: "nearest" });
  } else if (e.key === "k" || (e.key === "p" && e.ctrlKey)) {
    e.preventDefault();
    focusedRow = Math.max(focusedRow - 1, 0);
    render();
    const row = content.querySelector(".row.focused");
    if (row) row.scrollIntoView({ block: "nearest" });
  } else if (e.key === "Enter" || e.key === " ") {
    if (filtered.length === 0) return;
    e.preventDefault();
    const c = filtered[focusedRow];
    expandedIndex = expandedIndex === c.index ? null : c.index;
    render();
    const row = content.querySelector(".row.focused");
    if (row) row.scrollIntoView({ block: "nearest" });
  }
});

render();
  </script>
</body>
</html>
