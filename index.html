<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open Electives - 2026-27</title>
  <link rel="icon" type="image/png" href="https://www.iitbhu.ac.in/sites/default/files/iitbhu/images/other/iit_logo_original.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
*,
*::before,
*::after {
  box-sizing: border-box;
}
* {
  margin: 0;
}
html, body {
  height: 100%;
  overscroll-behavior: none;
}
body {
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-family: "Lato", sans-serif;

  --slate-900: #0f172a;
  --slate-800: #1e293b;
  --slate-700: #334155;
  --slate-500: #64748b;
  --slate-300: #cbd5e1;
  --slate-400: #94a3b8;
  --slate-200: #e2e8f0;
  --slate-100: #f1f5f9;
  --slate-50: #f8fafc;

  --zinc-900: #18181b;
  --neutral-900: #171717;
  --neutral-800: #262626;
  --neutral-700: #404040;
  --neutral-600: #525252;
  --neutral-500: #737373;
  --neutral-400: #a3a3a3;
  --neutral-300: #d4d4d4;

  --emerald-100: #d1fae5;
  --yellow-200: #fef08a;
  --yellow-100: #fef9c3;
  --yellow-300: #fde047;
  --yellow-400: #facc15;
  --yellow-500: #eab308;
  --yellow-600: #ca8a04;
  --yellow-700: #a16207;
  --yellow-800: #854d0e;
  --yellow-950: #422006;
  --green-600: #16a34a;
  --green-900: #14532d;
  --blue-900: #1e3a8a;
  --sky-950: #082f49;

  color: var(--neutral-900);
  --border-color: var(--slate-400);
  --bg: var(--slate-300);
  --row-hover: var(--slate-400);
  --batch-bg: var(--slate-200);
  --search-bg: var(--slate-100);

  background-color: var(--bg);
}

body.dark {
  --slate-900: #0f172a;
  --slate-800: #1e293b;
  --slate-700: #334155;
  --slate-500: #64748b;
  --slate-300: #334155;
  --slate-400: #475569;
  --slate-200: #1e293b;
  --slate-100: #262626;
  --slate-50: #171717;

  --neutral-900: #f1f5f9;
  --neutral-800: #e2e8f0;
  --neutral-700: #cbd5e1;
  --neutral-600: #94a3b8;
  --neutral-500: #64748b;
  --neutral-400: #475569;
  --neutral-300: #334155;

  color: var(--neutral-900);
  --border-color: var(--slate-500);
  --bg: #0f172a;
  --row-hover: #1e293b;
  --batch-bg: #1e293b;
  --search-bg: #262626;

  background-color: var(--bg);
}
img, picture, video, canvas, svg {
  display: block;
  max-width: 100%;
}
input, button, textarea, select {
  font: inherit;
}
p, h1, h2, h3, h4, h5, h6 {
  overflow-wrap: break-word;
}
#root {
  isolation: isolate;
  display: flex;
  flex-direction: column;
  height: 100svh;
  max-height: 100svh;
  height: 100dvh;
  max-height: 100dvh;
}

header {
  padding: 1rem 1rem 16px 24px;
  line-height: 1;
  border-bottom: 1px solid var(--border-color);
  font-family: monospace;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: space-between;
  position: relative;
  flex-shrink: 0;
}
.header-left {
  display: flex;
  gap: 0.25rem;
  flex-direction: column;
}
header h1 {
  font-size: 1.5rem;
  margin: 0;
  font-family: "Lato", sans-serif;
}
.subhead {
  font-size: 0.875rem;
  opacity: 0.7;
  transform: translateX(1px);
  font-family: monospace;
}
.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.5rem;
}
.header-right a {
  color: inherit;
  transition: color 0.1s ease-in-out;
}
.header-right a:hover {
  color: var(--neutral-500);
}
.header-actions {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 0.5rem;
}
.gh-star {
  display: inline-flex;
  align-items: center;
  gap: 0.25rem;
  text-decoration: none;
  font-size: 0.8rem;
  font-family: "Lato", sans-serif;
  padding: 0.25rem 0.5rem;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  transition: background-color 0.1s ease-in-out;
}
.gh-star:hover {
  background-color: var(--row-hover);
  color: var(--neutral-900) !important;
}
.dark-toggle {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  padding: 0.25rem;
  cursor: pointer;
  color: var(--neutral-700);
  transition: background-color 0.1s ease-in-out;
}
.dark-toggle:hover {
  background-color: var(--row-hover);
  color: var(--neutral-900);
}
.dark-toggle .sun,
.dark-toggle .moon {
  display: block;
}
body.dark .dark-toggle .sun {
  display: none;
}
body:not(.dark) .dark-toggle .moon {
  display: none;
}

.branch-bar {
  padding: 0.375rem 24px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.branch-bar label {
  font-family: monospace;
  font-size: 0.75rem;
  color: var(--neutral-600);
  white-space: nowrap;
}
.branch-bar select {
  flex: 1;
  padding: 0.375rem 0.5rem;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  background: var(--search-bg);
  color: var(--neutral-900);
  font-family: monospace;
  font-size: 0.8125rem;
  outline: none;
  cursor: pointer;
}
.branch-bar select:focus {
  border-color: var(--neutral-600);
}

.year-bar {
  padding: 0.25rem 24px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.year-bar label {
  font-family: monospace;
  font-size: 0.75rem;
  color: var(--neutral-600);
  white-space: nowrap;
}
.year-bar select {
  padding: 0.25rem 0.5rem;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  background: var(--search-bg);
  color: var(--neutral-900);
  font-family: monospace;
  font-size: 0.8125rem;
  outline: none;
  cursor: pointer;
}
.year-bar select:focus {
  border-color: var(--neutral-600);
}

.search-bar {
  padding: 0.5rem 24px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}
.search-bar input {
  width: 100%;
  padding: 0.5rem 0.75rem;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  background: var(--search-bg);
  color: var(--neutral-900);
  font-family: monospace;
  font-size: 0.875rem;
  outline: none;
  transition: border-color 0.1s ease-in-out;
}
.search-bar input:focus {
  border-color: var(--neutral-600);
}
.search-bar input::placeholder {
  color: var(--neutral-500);
}

.content {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overscroll-behavior: contain;
}
.content::-webkit-scrollbar {
  width: 0;
}
.course-count {
  padding: 0.5rem 24px;
  font-family: monospace;
  font-size: 0.75rem;
  color: var(--neutral-600);
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.row {
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--border-color);
  transition: background-color 0.1s ease-in-out;
}
.row:hover,
.row.focused {
  background-color: var(--row-hover);
}
.row.focused {
  outline: 1px solid var(--neutral-600);
  outline-offset: -1px;
}
.row.liked {
  border-left: 3px solid var(--green-600);
}
.row.disliked {
  border-left: 3px solid var(--yellow-600);
}
.row-main {
  display: grid;
  grid-template-columns: auto auto 1fr auto auto;
  gap: 0.5rem;
  padding: 0.5rem 24px;
  align-items: center;
  font-family: monospace;
  font-size: 0.875rem;
}
.not-eligible {
  display: none;
  font-size: 0.6875rem;
  color: var(--yellow-700);
  font-family: monospace;
}
.not-eligible.show {
  display: block;
}
.row-index {
  opacity: 0.7;
  user-select: none;
}
.row-index span {
  opacity: 0.3;
}
.row-info {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.row-code {
  color: var(--neutral-700);
}
.row-name {
  color: var(--neutral-900);
}
.row-meta {
  font-size: 0.75rem;
  color: var(--neutral-600);
}
.vote-group {
  display: flex;
  gap: 0.25rem;
  align-items: center;
}
.vote-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border: 1px solid var(--border-color);
  border-radius: 50%;
  background: var(--search-bg);
  color: var(--neutral-500);
  font-size: 14px;
  font-weight: 700;
  line-height: 1;
  cursor: pointer;
  transition: all 0.1s ease-in-out;
  user-select: none;
  font-family: monospace;
  padding: 0;
}
.vote-btn:hover {
  background: var(--row-hover);
}
.vote-btn.liked {
  background: var(--green-600);
  border-color: var(--green-600);
  color: #fff;
}
.vote-btn.disliked {
  background: var(--yellow-600);
  border-color: var(--yellow-600);
  color: #fff;
}
.row-toggle {
  color: var(--neutral-600);
  transition: transform 0.15s ease-in-out;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
}
.row-toggle.open {
  transform: rotate(180deg);
}

.row-details {
  display: none;
  max-height: 300px;
  overflow-y: auto;
  background: var(--batch-bg);
}
.row-details.open {
  display: block;
}
.row-details::-webkit-scrollbar {
  width: 6px;
}
.row-details::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 3px;
}
.row-details-inner {
  padding: 0.5rem 24px 0.75rem;
  border-top: 1px solid var(--border-color);
}
.sem-group {
  margin-bottom: 0.75rem;
}
.sem-group:last-child {
  margin-bottom: 0;
}
.sem-header {
  font-family: monospace;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--neutral-600);
  margin-bottom: 0.25rem;
  padding-bottom: 0.125rem;
  border-bottom: 1px dashed var(--border-color);
}
.batch-item {
  font-family: monospace;
  font-size: 0.75rem;
  color: var(--neutral-700);
  padding: 0.125rem 0 0.125rem 0.75rem;
}
.batch-item .type-badge {
  display: inline-block;
  font-size: 0.625rem;
  padding: 0 0.375rem;
  border-radius: 3px;
  margin-right: 0.375rem;
  background: var(--neutral-400);
  color: var(--slate-900);
}
.type-badge.oe {
  background: var(--yellow-600);
  color: var(--yellow-100);
}
.type-badge.st {
  background: var(--blue-900);
  color: var(--slate-200);
}
.type-badge.compulsory {
  background: var(--green-600);
  color: var(--emerald-100);
}
.no-batches {
  font-family: monospace;
  font-size: 0.75rem;
  color: var(--neutral-500);
  font-style: italic;
}

.section {
  display: flex;
  flex-direction: column;
}
.section-header {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 24px 0.25rem;
  font-family: monospace;
  font-size: 0.6875rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--neutral-500);
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 1;
}
.section-header .section-count {
  font-size: 0.625rem;
  background: var(--border-color);
  color: var(--neutral-700);
  border-radius: 999px;
  padding: 0 0.375rem;
  line-height: 1.4;
}
.grip {
  cursor: grab;
  display: inline-flex;
  align-items: center;
  color: var(--neutral-500);
  opacity: 0.4;
  transition: opacity 0.1s ease-in-out;
  user-select: none;
  touch-action: none;
}
.row:hover .grip {
  opacity: 0.8;
}
.grip:active {
  cursor: grabbing;
}
.row.dragging {
  opacity: 0.4;
}
.row.drag-over {
  outline: 2px dashed var(--neutral-500);
  outline-offset: -2px;
}

.no-results {
  padding: 2rem 24px;
  text-align: center;
  font-family: monospace;
  font-size: 0.875rem;
  color: var(--neutral-500);
}

@media (max-width: 768px) {
  header {
    flex-direction: column;
    gap: 1rem;
    padding-left: 0.5rem;
    padding-right: 0.5rem;
  }
  .header-left {
    align-items: center;
  }
  .header-right {
    flex-direction: row;
    width: 100%;
    justify-content: space-between;
    align-items: center;
  }
  .header-actions {
    order: 1;
  }
  .header-right p {
    order: 0;
  }
  .row-main {
    grid-template-columns: 1fr auto;
    padding: 0.5rem 12px;
  }
  .row-index {
    display: none;
  }
  .grip {
    display: none;
  }
  .row-toggle {
    display: none;
  }
  .branch-bar {
    padding: 0.375rem 12px;
  }
  .year-bar {
    padding: 0.25rem 12px;
  }
  .search-bar {
    padding: 0.5rem 12px;
  }
  .course-count {
    padding: 0.5rem 12px;
  }
  .section-header {
    padding: 0.5rem 12px 0.25rem;
  }
  .bottom-bar {
    padding: 0.5rem 12px;
    flex-wrap: wrap;
  }
}

@media print {
  body {
    --bg: #fff !important;
    background: #fff !important;
    color: #000 !important;
  }
  header h1 { font-size: 1.25rem; }
  .subhead { display: none; }
  .header-right p { display: none; }
  .gh-star { display: none; }
  .dark-toggle { display: none; }
  .branch-bar { display: none; }
  .year-bar { display: none; }
  .search-bar { display: none; }
  .course-count { display: none; }
  .bottom-bar { display: none; }
  .toast { display: none; }
  .grip { display: none !important; }
  .vote-group { display: none !important; }
  .vote-btn { display: none !important; }
  .not-eligible { display: none !important; }
  .section-header {
    position: static;
    background: #fff;
    border-bottom-color: #ccc;
    color: #666;
  }
  .row { border-bottom-color: #ddd; }
  .row.liked { border-left-color: #16a34a; }
  .row.disliked { border-left-color: #eab308; }
  .row.focused { outline: none; }
  .row:hover { background: none; }
  .content { overflow: visible; height: auto; }
  #root { height: auto; max-height: none; }
}

@media (max-width: 550px) {
  .row-main {
    font-size: 0.75rem;
  }
}

.bottom-bar {
  padding: 0.5rem 24px;
  border-top: 1px solid var(--border-color);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  font-family: monospace;
  font-size: 0.75rem;
  color: var(--neutral-600);
  background: var(--bg);
}
.copy-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.375rem;
  padding: 0.375rem 0.75rem;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  background: var(--search-bg);
  color: var(--neutral-700);
  font-family: "Lato", sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: background-color 0.1s ease-in-out;
  white-space: nowrap;
}
.copy-btn:hover {
  background-color: var(--row-hover);
  color: var(--neutral-900);
}
.copy-btn svg {
  flex-shrink: 0;
}

.toast {
  position: fixed;
  bottom: 3rem;
  left: 50%;
  transform: translateX(-50%);
  background: var(--neutral-800);
  color: var(--slate-100);
  padding: 0.5rem 1rem;
  border-radius: 6px;
  font-family: monospace;
  font-size: 0.8125rem;
  opacity: 0;
  transition: opacity 0.2s ease-in-out;
  pointer-events: none;
  z-index: 100;
}
.toast.show {
  opacity: 1;
}

#root::after {
  content: "Jayesh-Dev21";
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: monospace;
  font-size: clamp(1.5rem, 8vw, 5rem);
  color: var(--neutral-500);
  opacity: 0.12;
  pointer-events: none;
  user-select: none;
  transform: rotate(-12deg);
  z-index: 9999;
  white-space: nowrap;
  overflow: hidden;
}
@media print {
  #root::after {
    opacity: 0.08;
    color: #999;
  }
}
  </style>
</head>
<body>
  <div id="root">
    <header>
      <div class="header-left">
        <h1>Open Electives</h1>
        <div class="subhead" id="subhead"></div>
      </div>
      <div class="header-right">
        <div class="header-actions">
          <a href="https://github.com/Jayesh-Dev21/Course_pref_details" class="gh-star" target="_blank">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/></svg>
            Jayesh-Dev21
          </a>
          <button id="dark-toggle" class="dark-toggle" aria-label="Toggle dark mode">
            <svg class="sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg class="moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
        <p>
          <a href="https://academicservices.iitbhu.ac.in">IIT BHU</a> &middot;
          <a href="https://github.com/Jayesh-Dev21/Course_pref_details">2026-27</a>
        </p>
      </div>
    </header>
    <div class="year-bar">
      <label for="year">Year:</label>
      <select id="year">
        <option value="3rd">3rd Year</option>
        <option value="4th">4th Year</option>
      </select>
    </div>
    <div class="branch-bar">
      <label for="branch">Branch:</label>
      <select id="branch"><option value="">All branches</option></select>
    </div>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search by code, name, department, or professor..." autocomplete="off">
    </div>
    <div class="course-count" id="course-count"></div>
    <div class="content" id="content"></div>
    <div class="bottom-bar">
      <span id="pref-count">Drag to rank your preferences</span>
      <div style="display:flex;gap:0.5rem">
        <button class="copy-btn" id="pdf-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Save PDF
        </button>
        <button class="copy-btn" id="copy-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M15 11h-6"/><path d="M15 7h-6"/><path d="M15 15h-6"/></svg>
          Copy preference list
        </button>
      </div>
    </div>
    <div class="toast" id="toast"></div>

.00","semester":"2022-23, ODD","batch":"MN- 4-Year B.Tech. VII-Semester"},{"subject":"EE-313:Modern Control Engineering","type":"ST","credits":"9.00","semester":"2022-23, ODD","batch":"ME- 5-Year IDD VII-Semester"},{"subject":"EE-313:Modern Control Engineering","type":"ST","credits":"9.00","semester":"2022-23, ODD","batch":"ME- 4-Year B.Tech. VII-Semester"},{"subject":"EE-313:Modern Control Engineering","type":"ST","credits":"9.00","semester":"2022-23, ODD","batch":"EE- 5-Year IDD V-Semester"},{"subject":"EE-313:Modern Control Engineering","type":"ST","credits":"9.00","semester":"2022-23, ODD","batch":"EE- 4-Year B.Tech. V-Semester"},{"subject":"EE-313:Modern Control Engineering","type":"ST","credits":"9.00","semester":"2022-23, ODD","batch":"MA- 5-Year IDD VII-Semester"},{"subject":"EE-313:Modern Control Engineering","type":"ST","credits":"9.00","semester":"2021-22, ODD","batch":"EE- 5-Year IDD V-Semester"},{"subject":"EE-313:Modern Control Engineering","type":"ST","credits":"9.00","semester":"2021-22, ODD","batch":"EE- 4-Year B.Tech. V-Semester"},{"subject":"EE-313:Modern Control Engineering","type":"ST","credits":"9.00","semester":"2020-21, ODD","batch":"ME- 5-Year IDD VII-Semester"},{"subject":"EE-313:Modern Control Engineering","type":"ST","credits":"9.00","semester":"2020-21, ODD","batch":"ME- 4-Year B.Tech. VII-Semester"},{"subject":"EE-313:Modern Control Engineering","type":"ST","credits":"9.00","semester":"2020-21, ODD","batch":"MT- 5-Year IDD VII-Semester"},{"subject":"EE-313:Modern Control Engineering","type":"ST","credits":"9.00","semester":"2020-21, ODD","batch":"EE- 5-Year IDD V-Semester"},{"subject":"EE-313:Modern Control Engineering","type":"ST","credits":"9.00","semester":"2020-21, ODD","batch":"EE- 4-Year B.Tech. V-Semester"}]}}

  <script>
(function() {
  const stored = localStorage.getItem("darkMode");
  if (stored === "true") document.body.classList.add("dark");
})();

document.getElementById("dark-toggle").addEventListener("click", () => {
  document.body.classList.toggle("dark");
  localStorage.setItem("darkMode", document.body.classList.contains("dark"));
});

const SUBHEADS = [
  "All choices, in case you miss one",
  "Scroll till you find the right elective",
  "Open electives for 2026-27",
];

document.getElementById("subhead").textContent =
  SUBHEADS[Math.floor(Math.random() * SUBHEADS.length)];

// ── Data sources ──
const coursesData3rd = JSON.parse(document.getElementById("courses-data-3rd").textContent);
const coursesData4th = JSON.parse(document.getElementById("courses-data-4th").textContent);
let currentYear = "3rd";
let baseList = [];

function getCourses() {
  return currentYear === "3rd" ? coursesData3rd : coursesData4th;
}

function buildBaseList(data) {
  return Object.entries(data).map(([code, c], i) => ({
    code,
    ...c,
    index: i + 1,
  }));
}

function rebuildBranchDropdown() {
  branchSelect.innerHTML = '<option value="">All branches</option>';
  const depts = [...new Set(baseList.map(c => c.department))].sort();
  for (const d of depts) {
    const opt = document.createElement("option");
    opt.value = d;
    opt.textContent = d;
    branchSelect.appendChild(opt);
  }
  if (prefs.branch) branchSelect.value = prefs.branch;
}

// ── Year selector ──
const yearSelect = document.getElementById("year");
yearSelect.addEventListener("change", () => {
  const year = yearSelect.value;
  localStorage.setItem("oe_year", year);
  currentYear = year;
  baseList = buildBaseList(getCourses());
  prefsKey = "oe_prefs_" + (year === "3rd" ? "3" : "4");
  prefs = loadPrefs();
  expandedIndex = null;
  focusedRow = 0;
  rebuildBranchDropdown();
  sortByPrefs();
  render();
  document.querySelector("header h1").textContent = 
    "Open Electives " + (year === "3rd" ? "3rd" : "4th") + " Year";
});

function getPrefsKey() {
  return "oe_prefs_" + (currentYear === "3rd" ? "3" : "4");
}

// ── Preferences ──
let prefsKey = "oe_prefs_3";
function loadPrefs() {
  try {
    return JSON.parse(localStorage.getItem(prefsKey)) || {};
  } catch { return {}; }
}
function savePrefs(prefs) {
  localStorage.setItem(prefsKey, JSON.stringify(prefs));
}

// ── Branch dropdown ──
const branchSelect = document.getElementById("branch");

// Init: build baseList from saved year and load prefs
let prefs;
{
  const savedYear = localStorage.getItem("oe_year") || "3rd";
  currentYear = savedYear;
  yearSelect.value = savedYear;
  baseList = buildBaseList(getCourses());
  prefsKey = "oe_prefs_" + (savedYear === "3rd" ? "3" : "4");
  prefs = loadPrefs();
  rebuildBranchDropdown();
  document.querySelector("header h1").textContent = 
    "Open Electives " + (savedYear === "3rd" ? "3rd" : "4th") + " Year";
}

// ── Sort courseList by saved order ──
let courseList;
function sortByPrefs() {
  const likes = prefs.likes || [];
  const neutral = prefs.neutral || [];
  const dislikes = prefs.dislikes || [];
  const branch = prefs.branch || "";

  const newLikes = [];
  const newNeutral = [];
  const newDisliked = [];
  const ineligible = [];

  for (const c of baseList) {
    if (likes.indexOf(c.code) >= 0) newLikes.push(c);
    else if (dislikes.indexOf(c.code) >= 0) newDisliked.push(c);
    else newNeutral.push(c);
  }

  newLikes.sort((a, b) => likes.indexOf(a.code) - likes.indexOf(b.code));
  newNeutral.sort((a, b) => neutral.indexOf(a.code) - neutral.indexOf(b.code));
  newDisliked.sort((a, b) => dislikes.indexOf(a.code) - dislikes.indexOf(b.code));

  // Save back any new additions
  const changed = JSON.stringify(newLikes.map(c => c.code)) !== JSON.stringify(likes)
    || JSON.stringify(newNeutral.map(c => c.code)) !== JSON.stringify(neutral)
    || JSON.stringify(newDisliked.map(c => c.code)) !== JSON.stringify(dislikes);

  if (changed) {
    prefs.likes = newLikes.map(c => c.code);
    prefs.neutral = newNeutral.map(c => c.code);
    prefs.dislikes = newDisliked.map(c => c.code);
    if (prefs.likes.length === 0) delete prefs.likes;
    if (prefs.neutral.length === 0) delete prefs.neutral;
    if (prefs.dislikes.length === 0) delete prefs.dislikes;
    savePrefs(prefs);
  }

  // Split neutral & disliked into ineligible when branch is set
  let liked = newLikes;
  let neutral2 = [];
  let disliked2 = [];
  let inelig = [];
  for (const c of newNeutral) {
    if (branch && c.department === branch) inelig.push(c);
    else neutral2.push(c);
  }
  for (const c of newDisliked) {
    if (branch && c.department === branch) inelig.push(c);
    else disliked2.push(c);
  }

  courseList = [...liked, ...neutral2, ...disliked2, ...inelig];
  // Store sections for drag scoping
  courseList.sections = {
    liked: new Set(liked.map(c => c.code)),
    neutral: new Set(neutral2.map(c => c.code)),
    disliked: new Set(disliked2.map(c => c.code)),
    ineligible: new Set(inelig.map(c => c.code)),
  };
}
sortByPrefs();

const searchInput = document.getElementById("search");
const content = document.getElementById("content");
const courseCount = document.getElementById("course-count");
const prefCount = document.getElementById("pref-count");

let focusedRow = 0;

// ── Helpers ──
let filtered = [];
let dragSource = null;
let expandedIndex = null;

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), 2000);
}

function getTypeClass(type) {
  const t = type.toLowerCase();
  if (t.includes("open elective")) return "oe";
  if (t.includes("compulsory")) return "compulsory";
  if (t.includes("st")) return "st";
  return "";
}

function renderBatchDetails(course) {
  let html = `<div style="margin-bottom: 1rem;">
    <a href="pdfs/${course.code}.pdf" target="_blank" class="copy-btn" style="text-decoration:none; display:inline-flex;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      View Syllabus PDF
    </a>
  </div>`;
  
  const batches = course.batches;
  if (!batches || batches.length === 0) {
    return html + '<div class="no-batches">No previous batch data available.</div>';
  }
  const grouped = {};
  for (const b of batches) {
    const sem = b.semester;
    if (!grouped[sem]) grouped[sem] = [];
    grouped[sem].push(b);
  }
  const sortedSems = Object.keys(grouped).sort().reverse();
  for (const sem of sortedSems) {
    const group = grouped[sem];
    html += '<div class="sem-group">';
    html += `<div class="sem-header">${sem} (${group.length} batch${group.length > 1 ? "es" : ""})</div>`;
    for (const b of group) {
      const typeClass = getTypeClass(b.type);
      html += `<div class="batch-item"><span class="type-badge ${typeClass}">${b.type}</span> ${b.batch}</div>`;
    }
    html += "</div>";
  }
  return html;
}

function getSection(code) {
  const s = courseList.sections;
  if (!s) return null;
  for (const [name, set] of Object.entries(s)) {
    if (set.has(code)) return name;
  }
  return null;
}

function render() {
  const query = searchInput.value.toLowerCase().trim();
  const branch = branchSelect.value;
  const showNotEligible = branch !== "";

  filtered = query
    ? courseList.filter(c => {
        const s = `${c.code} ${c.name} ${c.department} ${c.professor}`.toLowerCase();
        return s.includes(query);
      })
    : courseList;

  courseCount.textContent = `${filtered.length} of ${courseList.length} elective${courseList.length > 1 ? "s" : ""}`;

  const likes = prefs.likes || [];
  const likedCount = likes.length;
  prefCount.textContent = `${likedCount} liked · ${courseList.length - likedCount} unranked`;

  if (filtered.length === 0) {
    content.innerHTML = '<div class="no-results">No electives match your search.</div>';
    focusedRow = 0;
    return;
  }

  if (focusedRow >= filtered.length) focusedRow = filtered.length - 1;
  if (focusedRow < 0) focusedRow = 0;

  // Group filtered into sections preserving order
  const sections = { liked: [], neutral: [], disliked: [], ineligible: [] };
  const order = ["liked", "neutral", "disliked", "ineligible"];
  const sectionNames = { liked: "Liked", neutral: "Neutral", disliked: "Disliked", ineligible: "Not eligible" };
  const sectionClasses = { liked: "sec-liked", neutral: "sec-neutral", disliked: "sec-disliked", ineligible: "sec-ineligible" };
  const s = courseList.sections;
  if (s) {
    for (const c of filtered) {
      for (const key of order) {
        if (s[key].has(c.code)) { sections[key].push(c); break; }
      }
    }
  } else {
    sections.liked = filtered;
  }

  let html = "";
  let globalIdx = 1;
  for (const key of order) {
    const group = sections[key];
    if (group.length === 0) continue;
    const totalGlobal = filtered.length;
    html += `<div class="section ${sectionClasses[key]}">`;
    html += `<div class="section-header">${sectionNames[key]} <span class="section-count">${group.length}</span></div>`;
    for (const c of group) {
      const idx = String(globalIdx++).padStart(String(totalGlobal).length, "0");
      const isFocused = filtered.indexOf(c) === focusedRow;
      const notElig = showNotEligible && c.department === branch;
      const liked = likes.indexOf(c.code) >= 0;
      const disliked = (prefs.dislikes || []).indexOf(c.code) >= 0;

      let rowClass = isFocused ? "focused" : "";
      if (liked) rowClass += " liked";
      else if (notElig || disliked) rowClass += " disliked";

      html += `<div class="row${rowClass ? " " + rowClass : ""}" data-code="${c.code}" data-index="${c.index}">`;
      html += `  <div class="row-main">`;
      html += `    <div class="grip" draggable="true" data-grip="${c.code}">`;
      html += `      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="5" r="1.5"/><circle cx="15" cy="5" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="19" r="1.5"/><circle cx="15" cy="19" r="1.5"/></svg>`;
      html += `    </div>`;
      html += `    <div class="row-index">${idx}</div>`;
      html += `    <div class="row-info">`;
      html += `      <div><span class="row-code">${c.code}</span> <span class="row-name">${c.name}</span></div>`;
      html += `      <div class="row-meta">${c.department}${c.professor && c.professor !== "-" ? " &middot; " + c.professor : ""} &middot; ${c.credits} credits${c.ltp && c.ltp !== "-" ? " &middot; " + c.ltp : ""}</div>`;
      html += `      <div class="not-eligible ${notElig ? "show" : ""}">Not eligible for your branch</div>`;
      html += `    </div>`;
      html += `    <div class="row-toggle ${expandedIndex === c.index ? "open" : ""}">`;
      html += `      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>`;
      html += `    </div>`;
      html += `    <div class="vote-group">`;
      html += `      <button class="vote-btn ${liked ? "liked" : ""}" data-vote="like" data-code="${c.code}">+</button>`;
      html += `      <button class="vote-btn ${disliked || notElig ? "disliked" : ""}" data-vote="dislike" data-code="${c.code}">&minus;</button>`;
      html += `    </div>`;
      html += `  </div>`;
      html += `  <div class="row-details ${expandedIndex === c.index ? "open" : ""}">`;
      html += `    <div class="row-details-inner">${renderBatchDetails(c)}</div>`;
      html += `  </div>`;
      html += `</div>`;
    }
    html += `</div>`;
  }

  content.innerHTML = html;

  // Vote buttons
  content.querySelectorAll(".vote-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const code = btn.dataset.code;
      const vote = btn.dataset.vote;
      let likes2 = prefs.likes || [];
      let neutral2 = prefs.neutral || [];
      let dislikes2 = prefs.dislikes || [];

      // Remove from all
      const li = likes2.indexOf(code);
      const ni = neutral2.indexOf(code);
      const di = dislikes2.indexOf(code);
      if (li >= 0) likes2.splice(li, 1);
      if (ni >= 0) neutral2.splice(ni, 1);
      if (di >= 0) dislikes2.splice(di, 1);

      if (vote === "like") likes2.push(code);
      else dislikes2.push(code);

      prefs.likes = likes2;
      prefs.neutral = neutral2;
      prefs.dislikes = dislikes2;
      if (prefs.likes.length === 0) delete prefs.likes;
      if (prefs.neutral.length === 0) delete prefs.neutral;
      if (prefs.dislikes.length === 0) delete prefs.dislikes;
      savePrefs(prefs);
      sortByPrefs();
      render();
    });
  });

  // Row toggle expand
  content.querySelectorAll(".row").forEach(el => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.index, 10);
      expandedIndex = expandedIndex === idx ? null : idx;
      render();
    });
  });

  // Grip drag init
  content.querySelectorAll(".grip").forEach(grip => {
    grip.addEventListener("dragstart", (e) => {
      dragSource = grip.dataset.grip;
      const row = grip.closest(".row");
      if (row) row.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", grip.dataset.grip);
    });
  });

  // Row drop targets
  content.querySelectorAll(".row").forEach(el => {
    el.addEventListener("dragover", (e) => {
      if (e.dataTransfer.types.indexOf("text/plain") < 0) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      content.querySelectorAll(".row").forEach(r => r.classList.remove("drag-over"));
      if (el.dataset.code !== dragSource) el.classList.add("drag-over");
    });
    el.addEventListener("dragleave", () => {
      el.classList.remove("drag-over");
    });
    el.addEventListener("drop", (e) => {
      e.preventDefault();
      content.querySelectorAll(".row").forEach(r => r.classList.remove("drag-over"));
      const fromCode = e.dataTransfer.getData("text/plain");
      const toCode = el.dataset.code;
      if (!fromCode || fromCode === toCode) return;

      const fromSection = getSection(fromCode);
      const toSection = getSection(toCode);
      if (!fromSection || fromSection !== toSection) return;
      if (fromSection === "ineligible") return;

      if (fromSection === "liked") {
        let arr = prefs.likes || [];
        const fi = arr.indexOf(fromCode);
        const ti = arr.indexOf(toCode);
        if (fi < 0 || ti < 0) return;
        arr.splice(fi, 1);
        arr.splice(ti, 0, fromCode);
        prefs.likes = arr;
      } else if (fromSection === "neutral") {
        let arr = prefs.neutral || [];
        const fi = arr.indexOf(fromCode);
        const ti = arr.indexOf(toCode);
        if (fi < 0 || ti < 0) return;
        arr.splice(fi, 1);
        arr.splice(ti, 0, fromCode);
        prefs.neutral = arr;
      } else if (fromSection === "disliked") {
        let arr = prefs.dislikes || [];
        const fi = arr.indexOf(fromCode);
        const ti = arr.indexOf(toCode);
        if (fi < 0 || ti < 0) return;
        arr.splice(fi, 1);
        arr.splice(ti, 0, fromCode);
        prefs.dislikes = arr;
      }
      savePrefs(prefs);
      sortByPrefs();
      render();
    });
  });

  // Global dragend cleanup
  document.addEventListener("dragend", () => {
    content.querySelectorAll(".row").forEach(r => {
      r.classList.remove("dragging", "drag-over");
    });
    dragSource = null;
  }, { once: true });
}

// ── Branch change ──
branchSelect.addEventListener("change", () => {
  prefs.branch = branchSelect.value || undefined;
  if (!prefs.branch) delete prefs.branch;
  savePrefs(prefs);
  sortByPrefs();
  render();
});

// ── Search ──
searchInput.addEventListener("input", () => {
  expandedIndex = null;
  focusedRow = 0;
  render();
});

// ── PDF / Print ──
document.getElementById("pdf-btn").addEventListener("click", () => {
  window.print();
});

// ── Copy ──
document.getElementById("copy-btn").addEventListener("click", () => {
  const lines = [];
  lines.push("Open Elective Preferences - " + (currentYear === "3rd" ? "3rd" : "4th") + " Year 2026-27");
  lines.push("=".repeat(42));
  if (prefs.branch) lines.push(`Branch: ${prefs.branch}`);
  const date = new Date();
  lines.push(`Date: ${date.toLocaleDateString("en-IN", { year: "numeric", month: "short", day: "numeric" })}`);
  lines.push("");
  lines.push("Rank  Code      Course");
  lines.push("-".repeat(42));
  const likes = prefs.likes || [];
  const neutral = prefs.neutral || [];
  const dislikes = prefs.dislikes || [];
  const map = {};
  for (const c of baseList) map[c.code] = c;
  const ordered = [];
  for (const code of likes) if (map[code]) ordered.push(map[code]);
  for (const code of neutral) if (map[code] && likes.indexOf(code) < 0 && dislikes.indexOf(code) < 0) ordered.push(map[code]);
  for (const code of dislikes) if (map[code]) ordered.push(map[code]);
  // Catch any courses not in any array (shouldn't happen, but safeguard)
  for (const c of baseList) {
    if (likes.indexOf(c.code) < 0 && dislikes.indexOf(c.code) < 0 && neutral.indexOf(c.code) < 0) ordered.push(c);
  }
  ordered.forEach((c, i) => {
    lines.push(` ${String(i + 1).padStart(2)}   ${c.code.padEnd(9)} ${c.name}`);
  });
  const text = lines.join("\n");

  navigator.clipboard.writeText(text).then(() => {
    showToast("Preference list copied!");
  }).catch(() => {
    const ta = document.createElement("textarea");
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    showToast("Preference list copied!");
  });
});

// ── Keyboard ──
document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;

  if (e.key === "j" || (e.key === "n" && e.ctrlKey)) {
    e.preventDefault();
    focusedRow = Math.min(focusedRow + 1, filtered.length - 1);
    render();
    const row = content.querySelector(".row.focused");
    if (row) row.scrollIntoView({ block: "nearest" });
  } else if (e.key === "k" || (e.key === "p" && e.ctrlKey)) {
    e.preventDefault();
    focusedRow = Math.max(focusedRow - 1, 0);
    render();
    const row = content.querySelector(".row.focused");
    if (row) row.scrollIntoView({ block: "nearest" });
  } else if (e.key === "Enter") {
    if (filtered.length === 0) return;
    e.preventDefault();
    const c = filtered[focusedRow];
    expandedIndex = expandedIndex === c.index ? null : c.index;
    render();
    const row = content.querySelector(".row.focused");
    if (row) row.scrollIntoView({ block: "nearest" });
  } else if (e.key === " ") {
    if (filtered.length === 0) return;
    e.preventDefault();
    const c = filtered[focusedRow];
    const likes2 = prefs.likes || [];
    const dislikes2 = prefs.dislikes || [];
    const idx = likes2.indexOf(c.code);
    if (idx >= 0) likes2.splice(idx, 1);
    else {
      const dIdx = dislikes2.indexOf(c.code);
      if (dIdx >= 0) dislikes2.splice(dIdx, 1);
      likes2.push(c.code);
    }
    prefs.likes = likes2;
    prefs.dislikes = dislikes2;
    if (prefs.likes.length === 0) delete prefs.likes;
    if (prefs.dislikes.length === 0) delete prefs.dislikes;
    savePrefs(prefs);
    sortByPrefs();
    render();
    const row = content.querySelector(".row.focused");
    if (row) row.scrollIntoView({ block: "nearest" });
  }
});

render();
  </script>
</body>
